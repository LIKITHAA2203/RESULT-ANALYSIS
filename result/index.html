<!DOCTYPE html>
<html>
<head>
<title>Semester Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

.box{
margin-top:120px;
background:white;
padding:30px;
width:300px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:green;
color:white;
border:none;
cursor:pointer;
}

</style>

<script>
function checkLogin(){

var id=document.getElementById("id").value;
var user=document.getElementById("user").value;

if(id=="2117240020208" && user=="7305696509")
{
window.location="result.html";
}
else
{
alert("Invalid ID or Username");
}

}
</script>

</head>

<body>

<h2>RESULT OF EVEN SEMESTER 2ND YEAR</h2>

<div class="box">

<input type="text" id="id" placeholder="Enter ID"><br>

<input type="text" id="user" placeholder="Enter Username"><br>

<button onclick="checkLogin()">View Result</button>

</div>

</body>
